# OpenGit Policy Configuration
#
# Rules are evaluated in order: first match wins.
# Identity patterns support simple globs: "agent-*", "human-*", "*"

policies:
  - repo: "*"
    rules:
      # === Agent Rules (born from 18-repo branch deletion incident) ===
      - identity: "agent-*"
        action: push
        permission: allow

      - identity: "agent-*"
        action: force-push
        permission: deny
        reason: "强推绝对禁止 — 18个仓库分支被误删的教训"

      - identity: "agent-*"
        action: delete-branch
        permission: deny
        reason: "删除远程分支绝对禁止 — 无任何绕过方式"

      - identity: "agent-*"
        action: delete-repo
        permission: deny
        reason: "删除仓库绝对禁止"

      - identity: "agent-*"
        action: reset-staging
        permission: deny
        reason: "多Agent共享暂存区，清空=丢别人的工作"

      - identity: "agent-*"
        action: add-all
        permission: deny
        reason: "只能add自己改的文件，严禁git add -A"

      - identity: "agent-*"
        action: stash
        permission: deny
        reason: "stash在多Agent环境会丢工作"

      - identity: "agent-*"
        action: tag
        permission: allow

      - identity: "agent-*"
        action: merge
        permission: allow

      - identity: "agent-*"
        action: read
        permission: allow

      - identity: "agent-*"
        action: admin
        permission: deny
        reason: "Agent不能管理仓库设置"

      # === Human Rules ===
      - identity: "human-*"
        action: push
        permission: allow

      - identity: "human-*"
        action: force-push
        permission: audit-log
        reason: "人类强推需审计记录"

      - identity: "human-*"
        action: delete-branch
        permission: allow

      - identity: "human-*"
        action: delete-repo
        permission: confirm
        reason: "删除仓库需要二次确认"

      - identity: "human-*"
        action: read
        permission: allow

      - identity: "human-*"
        action: tag
        permission: allow

      - identity: "human-*"
        action: merge
        permission: allow

      - identity: "human-*"
        action: admin
        permission: allow
