name: Release

# 触发条件：推 tag (v*.*.*) 或手动触发
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v0.5.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  # Docker
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/opengit

jobs:
  # ─── 版本信息 ─────────────────────────────────────────────────
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$(echo $VERSION | grep -qE 'beta|rc|alpha' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  # ─── 多平台二进制构建 ─────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (native)
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact_name: opengit-x86_64-unknown-linux-gnu
            ext: tar.gz
            use_cross: false
          # Linux (cross-compile via cross)
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact_name: opengit-aarch64-unknown-linux-gnu
            ext: tar.gz
            use_cross: true
          # macOS (native ARM)
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact_name: opengit-aarch64-apple-darwin
            ext: tar.gz
            use_cross: false
          # Windows
          - target: x86_64-pc-windows-gnu
            runner: windows-latest
            artifact_name: opengit-x86_64-pc-windows-gnu
            ext: zip
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64-linux)
        if: matrix.use_cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Set macOS deployment target
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/opengit-core
            crates/opengit-server
            crates/opengit-cli
            crates/opengit-storage
            crates/opengit-ssh
            crates/opengit-hooks
            crates/opengit-dashboard

      - name: Build CLI
        shell: bash
        env:
          OPENSSL_NO_VENDOR: "0"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p opengit-cli --target ${{ matrix.target }}
          else
            cargo build --release -p opengit-cli --target ${{ matrix.target }}
          fi

      - name: Build Server
        shell: bash
        env:
          OPENSSL_NO_VENDOR: "0"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p opengit-server --target ${{ matrix.target }}
          else
            cargo build --release -p opengit-server --target ${{ matrix.target }}
          fi

      - name: Prepare artifact (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          # 收集二进制
          mkdir -p opengit-bin
          cp opengit opengit-server opengit-bin/ 2>/dev/null || true
          # Linux 添加运行时库
          if [[ "${{ matrix.target }}" == *"-linux-"* ]]; then
            ldd opengit | grep "not found" || true
          fi
          # 打包
          tar czf ${{ matrix.artifact_name }}.tar.gz -C opengit-bin .

      - name: Prepare artifact (Windows)
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p opengit-bin
          cp opengit.exe opengit-server.exe opengit-bin/ 2>/dev/null || true
          powershell -Command "Compress-Archive -Path opengit-bin/* -DestinationPath ${{ matrix.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/*.${{ matrix.ext }}
          retention-days: 30

  # ─── Docker 构建 ──────────────────────────────────────────────
  docker:
    name: Build Docker Image
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 生成校验和 ────────────────────────────────────────────────
  checksums:
    name: Generate Checksums
    needs: [version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: opengit-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS.txt
          retention-days: 30

  # ─── 发布 Release ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build-binaries, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: opengit-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: release-assets

      - name: List assets
        run: ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: OpenGit ${{ needs.version.outputs.version }}
          draft: false
          prerelease: ${{ needs.version.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/SHA256SUMS.txt
